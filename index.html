<!DOCTYPE html>
<!-- dave.dk, a domain that mostly just sits here.
     nothing to see here, really. but if you're the curious type:
     there's an older, louder version of this page. the year is a door,
     and the old cheat code still works. -->

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dave.dk</title>
<meta name="description" content="dave.dk. A domain lives here. Please don't feed it.">
<meta name="color-scheme" content="dark light">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23111317'/%3E%3Ctext x='16' y='23' font-size='20' font-family='monospace' font-weight='bold' fill='%23e6ac3f' text-anchor='middle'%3E@%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0c0d10;
    --fg:#eceef2;
    --muted:#878e9a;
    --faint:#5a616d;
    --accent:#e6ac3f;
    --accent-soft:rgba(230,172,63,.13);
    --line:rgba(255,255,255,.09);
    --panel:rgba(255,255,255,.02);
  }
  @media (prefers-color-scheme:light){
    :root{
      --bg:#f4f2ec;
      --fg:#1a1b1e;
      --muted:#6a7079;
      --faint:#9aa0a8;
      --accent:#9c6a12;
      --accent-soft:rgba(156,106,18,.10);
      --line:rgba(0,0,0,.11);
      --panel:rgba(0,0,0,.015);
    }
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    min-height:100dvh;
    display:grid;
    place-items:center;
    padding:9vh 24px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  /* a soft glow, nothing loud */
  body::before{
    content:"";
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(58% 42% at 50% -4%, var(--accent-soft), transparent 72%);
  }

  main{ position:relative; z-index:1; width:100%; max-width:600px; }

  .mono{ font-family:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace; }

  .kicker{
    display:flex; align-items:center; justify-content:space-between;
    font-size:.78rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); margin:0 0 2.2rem;
  }
  .kicker .id{ display:flex; align-items:center; gap:.55em; }
  /* the door: looks like a plain label, quietly links to the 1999 page */
  .kicker a.year{ color:inherit; text-decoration:none; letter-spacing:inherit;
    transition:color .25s ease; }
  .kicker a.year:hover, .kicker a.year:focus-visible{ color:var(--accent); outline:none; }
  .dot{
    width:8px; height:8px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 0 0 var(--accent);
    animation:pulse 2.6s ease-out infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 var(--accent-soft); }
    70%,100%{ box-shadow:0 0 0 7px transparent; }
  }

  h1{
    font-weight:600;
    font-size:clamp(2.1rem,6.4vw,3.3rem);
    line-height:1.06;
    letter-spacing:-.015em;
    margin:0 0 1.5rem;
  }

  .prose p{
    font-size:clamp(1.06rem,2.4vw,1.19rem);
    color:var(--fg);
    margin:0 0 1.15rem;
    max-width:56ch;
  }
  .prose b{ color:var(--accent); font-weight:600; }
  .prose .quiet{ color:var(--muted); }

  .cursor{
    display:inline-block; width:.5ch; color:var(--accent); font-weight:700;
    animation:blink 1.15s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  /* staggered entrance */
  .reveal{ opacity:0; animation:rise .8s cubic-bezier(.2,.7,.2,1) forwards; }
  .reveal.d1{ animation-delay:.05s; }
  .reveal.d2{ animation-delay:.16s; }
  .reveal.d3{ animation-delay:.28s; }
  .reveal.d4{ animation-delay:.46s; }
  @keyframes rise{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:none; } }

  @media (prefers-reduced-motion:reduce){
    .reveal{ opacity:1; animation:none; }
    .dot, .cursor{ animation:none; }
  }
</style>
</head>
<body>
<main>
  <p class="kicker mono reveal d1">
    <span class="id"><span class="dot"></span> dave.dk</span>
    <a class="year" href="/1999" aria-label="visit the 1999 version of this page">since 1999</a>
  </p>

  <h1 class="reveal d2">What is this place?</h1>

  <div class="prose reveal d3">
    <p>A domain lives here. Please don't feed it.<span class="cursor">_</span></p>
  </div>
</main>
<script>
/* the only easter egg worth its salt is one you have to find.
   up up down down left right left right B A  ->  the old web. */
(function(){
  var seq = [38,38,40,40,37,39,37,39,66,65], i = 0;
  window.addEventListener("keydown", function(e){
    if (e.keyCode === seq[i]) {
      if (++i === seq.length) { location.href = "/1999"; }
    } else {
      i = (e.keyCode === seq[0]) ? 1 : 0;
    }
  }, {passive:true});
})();
</script>
</body>
</html>
